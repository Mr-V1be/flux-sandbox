<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Flux Sandbox — falling-sand cellular automaton">
  <title>Flux Sandbox</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset="1" stop-color="#141416"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#1e2230" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left column: brand -->
  <g font-family="'Inter','SF Pro Display',-apple-system,system-ui,sans-serif" fill="#fafafa">
    <text x="68" y="322" font-size="136" font-weight="800" letter-spacing="-5">FLUX</text>
    <text x="72" y="400" font-size="50" font-weight="300" letter-spacing="11" fill="#9a9aa0">SANDBOX</text>
    <g fill="#70707a" font-size="19" font-weight="400">
      <text x="72" y="462">Falling-sand cellular automaton</text>
      <text x="72" y="490">54 materials · thermal field · chunked simulation</text>
    </g>
    <g transform="translate(72,526)" font-size="12" font-weight="500" fill="#a0a0a8">
      <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
        <rect x="0" y="0" width="78" height="22" rx="4" fill="#1a1a1f" stroke="#2a2a2f"/>
        <text x="39" y="15" text-anchor="middle">TypeScript</text>
        <rect x="86" y="0" width="46" height="22" rx="4" fill="#1a1a1f" stroke="#2a2a2f"/>
        <text x="109" y="15" text-anchor="middle">Vite</text>
        <rect x="140" y="0" width="64" height="22" rx="4" fill="#1a1a1f" stroke="#2a2a2f"/>
        <text x="172" y="15" text-anchor="middle">Canvas2D</text>
        <rect x="212" y="0" width="52" height="22" rx="4" fill="#1a1a1f" stroke="#2a2a2f"/>
        <text x="238" y="15" text-anchor="middle">60 FPS</text>
      </g>
    </g>
    <text x="72" y="588" fill="#3a3a42" font-family="ui-monospace,monospace" font-size="13">mr-v1be.github.io/flux-sandbox</text>
  </g>

  <!-- Right column: element palette (9 x 6 = 54 slots, one blank) -->
  <g transform="translate(648,100)" filter="url(#soft)">
    <!-- row 0 -->
    <rect x="0"   y="0"   width="48" height="48" rx="6" fill="#2a2a2f"/>
    <rect x="56"  y="0"   width="48" height="48" rx="6" fill="#5a5a62"/>
    <rect x="112" y="0"   width="48" height="48" rx="6" fill="#e5c47a"/>
    <rect x="168" y="0"   width="48" height="48" rx="6" fill="#4aa3ff"/>
    <rect x="224" y="0"   width="48" height="48" rx="6" fill="#6b4a2a"/>
    <rect x="280" y="0"   width="48" height="48" rx="6" fill="#9cff3a"/>
    <rect x="336" y="0"   width="48" height="48" rx="6" fill="#ff5a1a"/>
    <rect x="392" y="0"   width="48" height="48" rx="6" fill="#ff8a1a"/>
    <rect x="448" y="0"   width="48" height="48" rx="6" fill="#4a4a52"/>
    <!-- row 1 -->
    <rect x="0"   y="56"  width="48" height="48" rx="6" fill="#bfd9ff"/>
    <rect x="56"  y="56"  width="48" height="48" rx="6" fill="#b8ff7a"/>
    <rect x="112" y="56"  width="48" height="48" rx="6" fill="#8a5a2a"/>
    <rect x="168" y="56"  width="48" height="48" rx="6" fill="#3dc466"/>
    <rect x="224" y="56"  width="48" height="48" rx="6" fill="#aedcff"/>
    <rect x="280" y="56"  width="48" height="48" rx="6" fill="#cfe9ff"/>
    <rect x="336" y="56"  width="48" height="48" rx="6" fill="#3a3a42"/>
    <rect x="392" y="56"  width="48" height="48" rx="6" fill="#f0f0f5"/>
    <rect x="448" y="56"  width="48" height="48" rx="6" fill="#1a1a20"/>
    <!-- row 2 -->
    <rect x="0"   y="112" width="48" height="48" rx="6" fill="#6f4a1e"/>
    <rect x="56"  y="112" width="48" height="48" rx="6" fill="#ffd84a"/>
    <rect x="112" y="112" width="48" height="48" rx="6" fill="#c2302a"/>
    <rect x="168" y="112" width="48" height="48" rx="6" fill="#bfa37a"/>
    <rect x="224" y="112" width="48" height="48" rx="6" fill="#c94a1a"/>
    <rect x="280" y="112" width="48" height="48" rx="6" fill="#c4c9d4"/>
    <rect x="336" y="112" width="48" height="48" rx="6" fill="#e0a924"/>
    <rect x="392" y="112" width="48" height="48" rx="6" fill="#6ad46a"/>
    <rect x="448" y="112" width="48" height="48" rx="6" fill="#d9ff9a"/>
    <!-- row 3 -->
    <rect x="0"   y="168" width="48" height="48" rx="6" fill="#f0f5ff"/>
    <rect x="56"  y="168" width="48" height="48" rx="6" fill="#5c3a1e"/>
    <rect x="112" y="168" width="48" height="48" rx="6" fill="#8a2aff"/>
    <rect x="168" y="168" width="48" height="48" rx="6" fill="#ffd63a"/>
    <rect x="224" y="168" width="48" height="48" rx="6" fill="#b2632a"/>
    <rect x="280" y="168" width="48" height="48" rx="6" fill="#7d7d86"/>
    <rect x="336" y="168" width="48" height="48" rx="6" fill="#24c275"/>
    <rect x="392" y="168" width="48" height="48" rx="6" fill="#9c2a4a"/>
    <rect x="448" y="168" width="48" height="48" rx="6" fill="#3a7dff"/>
    <!-- row 4 -->
    <rect x="0"   y="224" width="48" height="48" rx="6" fill="#161821"/>
    <rect x="56"  y="224" width="48" height="48" rx="6" fill="#ff7a2a"/>
    <rect x="112" y="224" width="48" height="48" rx="6" fill="#2a9dc7"/>
    <rect x="168" y="224" width="48" height="48" rx="6" fill="#a26dff"/>
    <rect x="224" y="224" width="48" height="48" rx="6" fill="#54ff6a"/>
    <rect x="280" y="224" width="48" height="48" rx="6" fill="#8a6a3a"/>
    <rect x="336" y="224" width="48" height="48" rx="6" fill="#181820"/>
    <rect x="392" y="224" width="48" height="48" rx="6" fill="#9de0ff"/>
    <rect x="448" y="224" width="48" height="48" rx="6" fill="#d4a32a"/>
    <!-- row 5 -->
    <rect x="0"   y="280" width="48" height="48" rx="6" fill="#b6ff88"/>
    <rect x="56"  y="280" width="48" height="48" rx="6" fill="#050508" stroke="#2a2a2f"/>
    <rect x="112" y="280" width="48" height="48" rx="6" fill="#3a66ff"/>
    <rect x="168" y="280" width="48" height="48" rx="6" fill="#ff3a88"/>
    <rect x="224" y="280" width="48" height="48" rx="6" fill="#24e6ff"/>
    <rect x="280" y="280" width="48" height="48" rx="6" fill="#c0b86a"/>
    <rect x="336" y="280" width="48" height="48" rx="6" fill="#e5f5ff"/>
    <rect x="392" y="280" width="48" height="48" rx="6" fill="#f0e3a8"/>
    <!-- last slot left blank for airy negative space -->
  </g>

  <!-- corner badge -->
  <g transform="translate(1076,556)">
    <rect x="0" y="0" width="60" height="28" rx="14" fill="#1a1a1f" stroke="#2a2a2f"/>
    <text x="30" y="18" text-anchor="middle" fill="#b8b8c2" font-family="ui-monospace,monospace" font-size="13" font-weight="600">v0.1.0</text>
  </g>
</svg>
